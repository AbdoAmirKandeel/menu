<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bistro Admin | Control Panel</title>

    <link rel="icon" href="data:,">

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
        crossorigin="anonymous">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        /* ============================================================
        PROJECT: BISTRO/NGN ADMIN DASHBOARD
        STYLE: PREMIUM DARK UI
        ============================================================ */

        :root {
            --gold: #D4AF37;
            --red-alert: #FF4B5C;
            --bg-pure: #000000;
            --bg-soft: #0A0A0A;
            --surface: #161616;
            --surface-light: #1E1E1E;
            --border-dim: rgba(255, 255, 255, 0.08);
            --text-primary: #FFFFFF;
            --text-secondary: #A0A0A0;
            --radius-md: 16px;
            --radius-lg: 24px;
            --ease: cubic-bezier(0.23, 1, 0.32, 1);
        }

        /* 1. LAYOUT FOUNDATION */
        .admin-body {
            background-color: var(--bg-pure);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            padding-top: 100px;
            margin: 0;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
        }

        .admin-section {
            background: var(--surface);
            border: 1px solid var(--border-dim);
            border-radius: var(--radius-lg);
            padding: 40px;
            margin-bottom: 50px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }

        .section-header {
            margin-bottom: 35px;
        }

        .section-header h2 {
            font-size: 1.8rem;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 15px;
            margin: 0;
        }

        .section-header p {
            color: var(--text-secondary);
            margin-top: 10px;
        }

        /* 2. PREMIUM FORM DESIGN */
        .admin-form {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 25px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .input-group.full-width {
            grid-column: 1 / -1;
        }

        .input-group label {
            font-size: 0.9rem;
            font-weight: 700;
            color: var(--gold);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .input-group input,
        .input-group select,
        .input-group textarea {
            background: var(--bg-soft);
            border: 1px solid var(--border-dim);
            border-radius: 12px;
            padding: 15px 20px;
            color: white;
            font-size: 1rem;
            transition: 0.3s var(--ease);
        }

        .input-group input:focus,
        .input-group select:focus {
            border-color: var(--gold);
            outline: none;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.1);
        }

        /* 3. UPLOAD BUTTON */
        .add-product-btn {
            width: 100%;
            margin-top: 20px;
            padding: 20px;
            background: var(--gold);
            color: black;
            border: none;
            border-radius: 12px;
            font-weight: 900;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
        }

        .add-product-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(212, 175, 55, 0.2);
        }

        /* 4. INVENTORY LIST */
        .admin-grid {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .admin-card {
            background: var(--surface-light);
            border-radius: var(--radius-md);
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid var(--border-dim);
            transition: 0.3s;
        }

        .admin-card:hover {
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateX(10px);
        }

        .admin-info {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .admin-img-preview {
            width: 60px;
            height: 60px;
            border-radius: 10px;
            object-fit: cover;
            background: #222;
        }

        .admin-details h3 {
            font-size: 1.1rem;
            font-weight: 700;
            margin: 0;
        }

        .admin-details span {
            color: var(--gold);
            font-weight: 800;
            font-size: 0.9rem;
        }

        /* 5. THE DELETE BUTTON */
        .delete-btn {
            background: rgba(255, 75, 92, 0.1);
            color: var(--red-alert);
            border: 1px solid var(--red-alert);
            padding: 12px 24px;
            border-radius: 10px;
            font-weight: 800;
            text-transform: uppercase;
            font-size: 0.75rem;
            cursor: pointer;
            transition: 0.3s var(--ease);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .delete-btn:hover {
            background: var(--red-alert);
            color: white;
            box-shadow: 0 10px 20px rgba(255, 75, 92, 0.3);
        }

        /* 6. NAVBAR */
        .navbar {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            z-index: 1000;
            padding: 20px 0;
            border-bottom: 1px solid var(--border-dim);
        }

        .nav-content {
            max-width: 1000px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
        }

        .logo {
            font-weight: 900;
            letter-spacing: 2px;
        }

        .logo span {
            color: var(--gold);
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            font-weight: 700;
            font-size: 0.9rem;
        }

        .admin-divider {
            border: 0;
            height: 1px;
            background: var(--border-dim);
            margin: 60px 0;
        }

        .admin-card-loader {
            text-align: center;
            padding: 50px;
            color: var(--text-secondary);
        }

        @media (max-width: 768px) {
            .form-grid {
                grid-template-columns: 1fr;
            }

            .admin-card {
                flex-direction: column;
                align-items: flex-start;
                gap: 20px;
            }

            .delete-btn {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>

<body class="admin-body">

    <nav class="navbar">
        <div class="nav-content">
            <div class="logo">BISTRO<span>ADMIN</span></div>
            <div class="nav-links">
                <a href="index.html" target="_blank"><i class="fas fa-external-link-alt"></i> View Site</a>
            </div>
        </div>
    </nav>

    <main class="container">

        <section class="admin-section">
            <div class="section-header">
                <h2><i class="fas fa-plus-circle"></i> Add New Product</h2>
                <p>Fill in the details to update the menu in real-time.</p>
            </div>

            <form id="add-food-form" class="admin-form">
                <div class="form-grid">
                    <div class="input-group">
                        <label>Product Name</label>
                        <input type="text" id="food-name" required>
                    </div>

                    <div class="input-group">
                        <label>Price (KWD)</label>
                        <input type="number" id="food-price" required>
                    </div>

                    <div class="input-group">
                        <label>Menu Category</label>
                        <select id="food-category">
                            <option value="Appetizers">Appetizers / Starters</option>
                            <option value="Main">Main Course</option>
                            <option value="Grill">Grills & Tandoor</option>
                            <option value="Desserts">Desserts & Sweets</option>
                            <option value="Beverages">Cold & Hot Drinks</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>Image URL</label>
                        <input type="url" id="food-image" required>
                    </div>

                    <div class="input-group full-width">
                        <label>Product Description</label>
                        <textarea id="food-desc"></textarea>
                    </div>
                </div>

                <button type="submit" class="add-product-btn">
                    <i class="fas fa-cloud-upload-alt"></i> Upload to Menu
                </button>
            </form>
        </section>

        <hr class="admin-divider">

        <section class="admin-section">
            <div class="section-header">
                <h2><i class="fas fa-tasks"></i> Live Inventory</h2>
                <p>Current items active on your store database.</p>
            </div>

            <div id="admin-menu-grid" class="admin-grid">
                <div class="admin-card-loader">
                    <i class="fas fa-spinner fa-spin"></i> Fetching your data...
                </div>
            </div>
        </section>

    </main>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script src="admin.js"></script>

</body>

</html>
